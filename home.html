<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank App | Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body class="page page-home">
  <main class="dashboard-shell">
    <section class="card dashboard-card">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Account Overview</p>
          <h1 id="welcomeText">Welcome, User</h1>
        </div>
        <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
      </header>

      <section class="balance-panel">
        <p>Account Balance</p>
        <h2 id="balanceAmount">Rs. 0.00</h2>
      </section>

      <section class="action-panel">
        <h3>Deposit / Withdraw</h3>
        <label for="amountInput">Amount (INR)</label>
        <input id="amountInput" type="number" min="1" step="0.01" placeholder="Enter amount">

        <div class="btn-row">
          <button id="depositBtn" type="button">Deposit</button>
          <button id="withdrawBtn" type="button" class="danger-btn">Withdraw</button>
        </div>
      </section>

      <section class="transfer-panel">
        <h3>Transfer Money</h3>
        <label for="recipientInput">Recipient Name</label>
        <input id="recipientInput" type="text" placeholder="Enter recipient name">

        <label for="transferAmountInput">Transfer Amount (INR)</label>
        <input id="transferAmountInput" type="number" min="1" step="0.01" placeholder="Enter transfer amount">

        <button id="transferBtn" type="button" class="secondary-btn">Transfer</button>
      </section>

      <section class="utility-panel">
        <h3>More Actions</h3>
        <div class="btn-row utility-row">
          <button id="interestBtn" type="button" class="secondary-btn">Add 2% Interest</button>
          <button id="undoBtn" type="button" class="ghost-btn">Undo Last</button>
          <button id="clearHistoryBtn" type="button" class="danger-btn soft-danger-btn">Clear History</button>
        </div>
      </section>

      <p id="actionMessage" class="message" aria-live="polite"></p>

      <section class="history-panel">
        <h3>Recent Transactions</h3>
        <ul id="txList"></ul>
      </section>
    </section>
  </main>
</body>
</html>
