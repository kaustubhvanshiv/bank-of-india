<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank App | Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body class="page page-login">
  <main class="login-shell">
    <section class="card login-card">
      <p class="eyebrow">Simple Bank Application</p>
      <h1>Welcome Back</h1>
      <p class="subtext">Use the demo credentials to log in and manage your account.</p>

      <form id="loginForm" class="stack" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button id="loginBtn" type="submit">Login</button>
      </form>

      <p id="loginMessage" class="message" aria-live="polite"></p>

      <div class="demo-box">
        <p>Demo Credentials</p>
        <span>Username: user123</span>
        <span>Password: pass123</span>
      </div>
    </section>
  </main>
</body>
</html>
